name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          bash -n devcontainer-conf/nv.sh
          bash -n devcontainer-conf/smoke-test.sh
          bash -n devcontainer-conf/devcontainer-ci-smoke-test.sh

      - name: Validate devcontainer definitions
        run: |
          python3 -m json.tool .devcontainer/devcontainer.json > /dev/null
          python3 -m json.tool .devcontainer/base/devcontainer.json > /dev/null
          python3 -m json.tool .devcontainer/go/devcontainer.json > /dev/null
          python3 -m json.tool .devcontainer/web/devcontainer.json > /dev/null
          python3 -m json.tool .devcontainer/full/devcontainer.json > /dev/null

      - name: Validate tracked markdown docs
        run: |
          test -f CONTRIBUTING.md
          test -f docs/VERSION_POLICY.md
          test -f docs/CODESPACES_PREBUILD.md

      - name: Validate issue templates
        run: |
          test -f .github/ISSUE_TEMPLATE/bug_report.yml
          test -f .github/ISSUE_TEMPLATE/feature_request.yml
          test -f .github/ISSUE_TEMPLATE/config.yml

  devcontainer-flow:
    runs-on: ubuntu-latest
    needs: static
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            config: .devcontainer/devcontainer.json
            profile: full
          - name: base
            config: .devcontainer/base/devcontainer.json
            profile: base
          - name: go
            config: .devcontainer/go/devcontainer.json
            profile: go
          - name: web
            config: .devcontainer/web/devcontainer.json
            profile: web
          - name: full
            config: .devcontainer/full/devcontainer.json
            profile: full

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run devcontainer smoke test
        uses: devcontainers/ci@v0.3
        with:
          configFile: ${{ matrix.config }}
          push: never
          runCmd: bash ./devcontainer-conf/devcontainer-ci-smoke-test.sh ${{ matrix.profile }}
