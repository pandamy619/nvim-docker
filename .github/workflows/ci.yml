name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate launcher script
        run: bash -n devcontainer-conf/nv.sh

      - name: Build Docker image
        run: docker build -t my-dev-nvim ./devcontainer-conf

      - name: Smoke test Docker image
        run: bash ./devcontainer-conf/smoke-test.sh my-dev-nvim
