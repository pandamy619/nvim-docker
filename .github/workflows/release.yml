name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: base
            tag_suffix: "-base"
            latest_tag: "latest-base"
          - target: go
            tag_suffix: "-go"
            latest_tag: "latest-go"
          - target: web
            tag_suffix: "-web"
            latest_tag: "latest-web"
          - target: full
            tag_suffix: ""
            latest_tag: "latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build native Docker image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: ./devcontainer-conf
          target: ${{ matrix.target }}
          tags: local/my-dev-nvim-${{ matrix.target }}:${{ github.ref_name }}
          load: true
          cache-from: type=gha,scope=nvim-docker-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=nvim-docker-${{ matrix.target }}

      - name: Smoke test Docker image
        run: bash ./devcontainer-conf/smoke-test.sh local/my-dev-nvim-${{ matrix.target }}:${{ github.ref_name }} ${{ matrix.target }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./devcontainer-conf
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}${{ matrix.tag_suffix }}
            ghcr.io/${{ github.repository }}:${{ matrix.latest_tag }}
          cache-from: type=gha,scope=nvim-docker-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=nvim-docker-${{ matrix.target }}
